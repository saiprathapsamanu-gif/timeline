<div class="page">
  <h1 class="title">Work Orders</h1>

  <div class="controls">
    <label>Timescale</label>
    <ng-select
      [items]="['Month']"
      [searchable]="false"
      [clearable]="false"
      [(ngModel)]="selectedZoom">
    </ng-select>
  </div>

  <div class="timeline">
    <div class="left-panel">
      <div class="header">Work Center</div>
      <div class="row" *ngFor="let wc of workCenters">
        {{ wc }}
      </div>
    </div>

    <div class="right-panel">
      <div class="timeline-header">
        <div class="month" *ngFor="let month of months">
            {{ month.label }}
        </div>
      </div>

      <div class="timeline-body">
            <div class="row" *ngFor="let wc of workCenters">
                <div
                    class="bar"
                    *ngFor="let order of workOrders"
                    [ngStyle]="getBarStyle(order, wc)"
                    [ngClass]="order.status">
                    <span class="name">{{ order.name }}</span>
                    <div class="actions">
                        <span class="status-pill">{{ order.status }}</span>
                        <button class="more-btn" (click)="toggleMenu(order.name); $event.stopPropagation()">⋯</button>
                        <div
                            class="action-menu"
                            *ngIf="activeMenuId === order.name">
                            <div class="menu-item" (click)="openEditPanel(order); $event.stopPropagation()">Edit</div>
                            <div class="menu-item delete">Delete</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
  <!-- Overlay -->
    <div class="overlay" *ngIf="isPanelOpen" (click)="closePanel()"></div>

    <div class="side-panel" *ngIf="isPanelOpen">
  
        <div class="panel-inner">

            <div class="panel-header">
            <h2>Edit Work Order</h2>
            <button class="close-btn" (click)="closePanel()">✕</button>
            </div>

            <div class="panel-body" *ngIf="selectedOrder">

                <div class="field-group">
                    <label>Work Order Name</label>
                    <input type="text" [(ngModel)]="selectedOrder.name" />
                </div>

                <div class="field-group">
                    <label>Status</label>
                    <ng-select
                    [items]="statusOptions"
                    bindLabel="label"
                    bindValue="value"
                    [(ngModel)]="selectedOrder.status"
                    [searchable]="false"
                    [clearable]="false">
                    </ng-select>
                </div>

                <div class="field-group">
                    <label>Start Date</label>
                    <input
                        type="date"
                        [ngModel]="selectedOrder.startDate | date:'yyyy-MM-dd'"
                        (ngModelChange)="onStartDateChange($event)"/>
                </div>

                <div class="field-group">
                    <label>End Date</label>
                    <input
                        type="date"
                        [ngModel]="selectedOrder.endDate | date:'yyyy-MM-dd'"
                        (ngModelChange)="onEndDateChange($event)"/>
                </div>
            </div>
        </div>
        <div class="panel-footer">
            <button class="primary-btn" (click)="closePanel()">Save</button>
        </div>
    </div>
</div>
