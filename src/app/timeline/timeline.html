<div class="page">
  <h1 class="title">Work Orders</h1>

  <div class="controls">
    <label>Timescale</label>

    <ng-select
        [items]="['Hour','Day','Week','Month']"
        [searchable]="false"
        [clearable]="false"
        [(ngModel)]="selectedZoom">
    </ng-select>
  </div>

  <div class="timeline">
    <div class="left-panel">
      <div class="header">Work Center</div>
      <div class="row" *ngFor="let wc of workCenters">
        {{ wc }}
      </div>
    </div>

    <div class="right-panel">
      <div class="timeline-header" [style.width.px]="getTimelineWidth()">
        <div class="month" *ngFor="let month of months; let i = index" [style.width.px]="getMonthWidth(i)">
            {{ month.label }}
        </div>
      </div>

      <div class="timeline-body" [style.width.px]="getTimelineWidth()">
            <div class="row" *ngFor="let wc of workCenters" (click)="onTimelineClick($event, wc)">
                <div
                    class="bar"
                    *ngFor="let order of getOrdersForWorkCenter(wc); trackBy: trackByOrder"
                    (click)="$event.stopPropagation()"
                    (mousedown)="startDrag($event, order)"
                    [ngStyle]="getBarStyle(order, wc)"
                    [ngClass]="order.status">
                    <span class="name">{{ order.name }}</span>
                    <div class="actions">
                        <span class="status-pill" [ngClass]="order.status">{{ order.status }}</span>
                        <button class="more-btn" (click)="toggleMenu(order.name); $event.stopPropagation()">⋯</button>
                        <div
                            class="action-menu"
                            *ngIf="activeMenuId === order.name">
                            <div class="menu-item" (click)="openEditPanel(order); $event.stopPropagation()">Edit</div>
                            <div class="menu-item delete" (click)="deleteOrder(order); $event.stopPropagation()">Delete</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
  <!-- Overlay -->
    <div class="overlay" *ngIf="isPanelOpen" (click)="closePanel()"></div>

    <div class="side-panel" *ngIf="isPanelOpen">
  
        <div class="panel-inner">
           <div class="panel-header-wrapper">
            <div class="panel-header">
                <div>
                    <h2>Work Order Details</h2>
                    <p class="subtitle">
                    Specify the dates, name and status for this order
                    </p>
                </div>

                <div class="header-actions">
                    <button class="secondary-btn" (click)="closePanel()">Cancel</button>
                    <button class="primary-btn" (click)="saveOrder()">Create</button>
                </div>
            </div>

                <div class="divider"></div>

            <div class="panel-body" *ngIf="selectedOrder">

                <div class="field-group">
                    <label>Work Order Name</label>
                    <input type="text" [(ngModel)]="selectedOrder.name" />
                </div>

                <div class="field-group">
                    <label>Status</label>
                    <ng-select
                    [items]="statusOptions"
                    bindLabel="label"
                    bindValue="value"
                    [(ngModel)]="selectedOrder.status"
                    [searchable]="false"
                    [clearable]="false">
                    <ng-template ng-label-tmp let-item="item">
                        <span class="status-pill" [ngClass]="item.value">
                        {{ item.label }}
                        </span>
                    </ng-template>
                    </ng-select>
                </div>

                <div class="field-group">
                    <label>Start Date</label>
                    <input
                        #startDateInput
                        type="date"
                        [ngModel]="selectedOrder.startDate | date:'yyyy-MM-dd'"
                        (ngModelChange)="onStartDateChange($event)"
                        (click)="startDateInput.showPicker()"
                        (focus)="startDateInput.showPicker()"/>
                </div>

                <div class="field-group">
                    <label>End Date</label>
                    <input
                        #endDateInput
                        type="date"
                        [ngModel]="selectedOrder.endDate | date:'yyyy-MM-dd'"
                        (ngModelChange)="onEndDateChange($event)"
                        (click)="endDateInput.showPicker()"
                        (focus)="endDateInput.showPicker()"/>
                </div>
            </div>
          </div>
        </div>
    </div>
</div>
